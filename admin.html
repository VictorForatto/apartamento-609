<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Admin · Apartamento 609</title>
  <link rel="stylesheet" href="style.css" />
</head>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
<body>

  <div class="container">
    <div class="admin-card">

      <h1>Admin · Lista de Presentes</h1>

      <div id="login-box">
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Senha" />
        <button onclick="login()">Entrar</button>
      </div>

      <div id="admin-panel" style="display:none;">
        <h3>Novo / Editar Presente</h3>

        <input id="gift-name" placeholder="Nome do presente" />
        <textarea id="gift-desc" placeholder="Descrição"></textarea>
        <input id="gift-price" placeholder="Faixa de preço" />
        <input id="gift-order" type="number" placeholder="Ordem" />
        <textarea id="gift-links" placeholder="Links (1 por linha)"></textarea>

        <button onclick="saveGift()">Salvar</button>

        <hr />

        <h3>Presentes cadastrados</h3>
        <div id="gift-list"></div>
      </div>

    </div>
  </div>



</body>
</html>
